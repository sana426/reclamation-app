<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Connexion SRM Azilal</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #003f7f, #00b4d8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        .login-box h2 {
            color: #003f7f;
            margin-bottom: 10px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #0060bf;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-box button:hover {
            background: #003f7f;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 22px;
            cursor: pointer;
            color: #777;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <h2>Connexion</h2>

        <p>SRM Azilal - Réclamations</p>

        {% if messages %}

            {% for message in messages %}

                <div class="error">
                    {{ message }}
                </div>

            {% endfor %}

        {% endif %}

        <form method="post">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Nom d'utilisateur"
                   autocomplete="off"
                   required>

            <div class="password-container">

                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Mot de passe"
                       autocomplete="off"
                       required>

                <span class="toggle-password"
                      onclick="togglePassword()">

                    <i class="fa-regular fa-eye"></i>

                </span>

            </div>

            <button type="submit">
                Se connecter
            </button>

        </form>

    </div>

    <script>

        function togglePassword() {

            const passwordInput = document.getElementById("password");

            if (passwordInput.type === "password") {

                passwordInput.type = "text";

            } else {

                passwordInput.type = "password";
            }
        }

    </script>

</body>

</html>
